<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Sign Up — AI Tools Hub</title>
        <link rel="stylesheet" href="css/style.css">
          <link rel="stylesheet" href="css/auth.css">
            <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
              <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
              </head>
              <body class="auth-page">

                <div class="auth-wrapper">

                    <!-- Left Side -->
                        <div class="auth-left">
                              <div class="auth-logo">
                                      <div class="logo-icon">
                                                <i class="fas fa-bolt"></i>
                                                        </div>
                                                                <h2>AI Tools Hub</h2>
                                                                      </div>
                                                                            <h1>AI Tools ki<br>Duniya Join Karo</h1>
                                                                                  <p>Apna free account banao aur 70+ AI tools explore karo.</p>

                                                                                        <div class="auth-features">
                                                                                                <div class="auth-feature">
                                                                                                          <i class="fas fa-check-circle"></i>
                                                                                                                    <span>Bilkul Free Account</span>
                                                                                                                            </div>
                                                                                                                                    <div class="auth-feature">
                                                                                                                                              <i class="fas fa-check-circle"></i>
                                                                                                                                                        <span>Favorites Cloud Mein Save</span>
                                                                                                                                                                </div>
                                                                                                                                                                        <div class="auth-feature">
                                                                                                                                                                                  <i class="fas fa-check-circle"></i>
                                                                                                                                                                                            <span>Naye Tools Ka Notification</span>
                                                                                                                                                                                                    </div>
                                                                                                                                                                                                            <div class="auth-feature">
                                                                                                                                                                                                                      <i class="fas fa-check-circle"></i>
                                                                                                                                                                                                                                <span>Personal Profile</span>
                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                                  </div>

                                                                                                                                                                                                                                                      <!-- Right Side — Signup Form -->
                                                                                                                                                                                                                                                          <div class="auth-right">
                                                                                                                                                                                                                                                                <div class="auth-card">

                                                                                                                                                                                                                                                                        <h2>Account Banao 🚀</h2>
                                                                                                                                                                                                                                                                                <p class="auth-subtitle">Bilkul free — sirf 30 second</p>

                                                                                                                                                                                                                                                                                        <div class="auth-message" id="authMessage"></div>

                                                                                                                                                                                                                                                                                                <!-- Google Signup -->
                                                                                                                                                                                                                                                                                                        <button class="google-btn" onclick="loginWithGoogle()">
                                                                                                                                                                                                                                                                                                                  <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                                                                                                                                                                                                                                                                                                                            Google se Sign Up Karo
                                                                                                                                                                                                                                                                                                                                    </button>

                                                                                                                                                                                                                                                                                                                                            <div class="divider"><span>ya email se</span></div>

                                                                                                                                                                                                                                                                                                                                                    <div class="auth-form">

                                                                                                                                                                                                                                                                                                                                                              <div class="form-group">
                                                                                                                                                                                                                                                                                                                                                                          <label>Pura Naam</label>
                                                                                                                                                                                                                                                                                                                                                                                      <div class="input-wrapper">
                                                                                                                                                                                                                                                                                                                                                                                                    <i class="fas fa-user"></i>
                                                                                                                                                                                                                                                                                                                                                                                                                  <input
                                                                                                                                                                                                                                                                                                                                                                                                                                  type="text"
                                                                                                                                                                                                                                                                                                                                                                                                                                                  id="signupName"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  placeholder="Apna naam likho"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                />
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="form-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <label>Email Address</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="input-wrapper">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <i class="fas fa-envelope"></i>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <input
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    type="email"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    id="signupEmail"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    placeholder="apna@email.com"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  />
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <div class="form-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <label>Password</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <div class="input-wrapper">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <i class="fas fa-lock"></i>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <input
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      type="password"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      id="signupPassword"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      placeholder="Min 6 characters"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    />
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <button class="toggle-pass" onclick="togglePassword('signupPassword')">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <i class="fas fa-eye"></i>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <button class="auth-btn" onclick="signupWithEmail()">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <i class="fas fa-user-plus"></i>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        Account Banao
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </button>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <p class="auth-switch">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            Pehle se account hai?
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <a href="login.html">Login Karo</a>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </p>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <script type="module" src="js/auth.js"></script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </html>
