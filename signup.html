<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — AI Tools Hub</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/auth.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
              
<body class="auth-page">

<div class="auth-wrapper">

         <!-- Left Side -->
                       
 <div class="auth-left">
 <div class="auth-logo">
 <div class="logo-icon">
 <i class="fas fa-bolt"></i>

</div>

<h2>AI Tools Hub</h2>

</div>

<p>Create your free account and explore 70+ AI tools.</p>

<div class="auth-features">
<div class="auth-feature">
<i class="fas fa-check-circle"></i>
<span>Totally free account</span>

</div>

<div class="auth-feature">
<i class="fas fa-check-circle"></i>
<span>Cloud Sync Favorites</span>
</div>

<div class="auth-feature">
 <i class="fas fa-check-circle"></i>
<span>Notification of new tools</span>
</div>

<div class="auth-feature">
<i class="fas fa-check-circle"></i>
<span>Personal Profile</span>
</div>

     <!-- Right Side — Signup Form -->

<div class="auth-right">

<div class="auth-card">

<h2>Create Your Account 🚀</h2>
 
<p class="auth-subtitle">Totally Free — Sign Up in Just 30 Seconds</p>

<div class="auth-message" id="authMessage"></div>

<!-- Google Signup -->

<button class="google-btn" onclick="loginWithGoogle()">

<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">

Sign Up with Google 
 
</button>

<div class="divider"><span>or continue with email</span></div>
<div class="auth-form">
<div class="form-group">
<label>Your Name</label>
<div class="input-wrapper">
<i class="fas fa-user"></i>
 
<input
type="text"
id="signupName"
placeholder="Your Name"/>

</div>

<div class="form-group">
 
<label>Email Address</label>

<div class="input-wrapper">

 <i class="fas fa-envelope"></i>

<input
type="email"
 id="signupEmail"
placeholder="your@email.com"/>
 
</div>

<div class="form-group">

<label>Password</label>

<div class="input-wrapper">
 
<i class="fas fa-lock"></i>

<input 
type="password"
id="signupPassword"
placeholder="Min 6 characters"/>

<button class="toggle-pass" onclick="togglePassword('signupPassword')>
<i class="fas fa-eye"></i>
 </button>
 
</div>
<button class="auth-btn" onclick="signupWithEmail()">
<i class="fas fa-user-plus"></i>
create Account 
</button>
</div>

<p class="auth-switch">
 Already have an account? Log In
 <a href="login.html">Login</a>
 
</p>

</div>

<script type="module" src="js/auth.js"></script>
 
</body>

</html>
